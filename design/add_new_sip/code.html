<style>
        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Custom styling for the range slider to fit brand */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;

            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e4e2de; /* surface-variant */
            border-radius: 4px;
        }

<body class="bg-background text-on-background font-body-md text-body-md antialiased flex flex-col min-h-screen">
<!-- TopAppBar JSON Component -->
<header class="bg-[#FDFCF0] border-none shadow-[0_4px_20px_-10px_rgba(62,47,40,0.12)] flex justify-between items-center w-full px-5 h-16 fixed top-0 z-50">
<button aria-label="Close" class="text-[#5D8A66] hover:opacity-80 flex items-center justify-center">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#5D8A66]">coffee</span>
<h1 class="text-[#5D8A66] font-bold italic font-public-sans font-semibold text-lg tracking-tight">SipTrack</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high border border-outline-variant">

</div>
</header>

<span class="material-symbols-outlined text-[16px] text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-label-sm text-label-sm text-on-surface">从照片提取的数据</span>
</div>
</section>

<!-- Drink Type Toggle -->
<div class="flex flex-col gap-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">饮品类型</label>
<div class="flex gap-2 bg-surface-container p-1 rounded-lg">
<button class="flex-1 py-2 px-4 rounded-md bg-primary-container text-on-primary-container font-body-md text-body-md font-medium shadow-sm flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">local_cafe</span> 咖啡
                    </button>
<button class="flex-1 py-2 px-4 rounded-md text-on-surface-variant font-body-md text-body-md hover:bg-surface-container-high flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">emoji_food_beverage</span> 奶茶
                    </button>
</div>
</div>
<!-- Brand Name Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider pl-1">品牌名称</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:border-tertiary focus:ring-1 focus:ring-tertiary outline-none" type="text" value="Blue Bottle Coffee"/>
</div>

<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider pl-1">饮品名称</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:border-tertiary focus:ring-1 focus:ring-tertiary outline-none" type="text" value="Oat Milk Flat White"/>
</div>
<!-- Volume & Price Grid -->
<div class="grid grid-cols-2 gap-gutter">
<div class="flex flex-col gap-xs">

<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-4 pr-10 py-3 font-body-md text-body-md text-on-surface focus:border-tertiary focus:ring-1 focus:ring-tertiary outline-none" type="number" value="350"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md text-body-md">ml</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider pl-1">价格</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md text-body-md">¥</span>
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-8 pr-4 py-3 font-body-md text-body-md text-on-surface focus:border-tertiary focus:ring-1 focus:ring-tertiary outline-none" step="0.01" type="number" value="5.50"/>
</div>
</div>
</div>

<span class="font-body-md text-body-md font-medium text-primary">正常 (100%)</span>
</div>
<div class="px-2 pb-2">
<input class="w-full" max="100" min="0" step="25" type="range" value="100"/>
<div class="flex justify-between px-1 mt-2 text-on-surface-variant font-label-sm text-label-sm text-[10px]">
<span>0%</span>
<span>25%</span>
<span>50%</span>
<span>75%</span>
<span>100%</span>
</div>
</div>
</div>
<hr class="border-outline-variant/30 my-1"/>

<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider pl-1">数量</label>
<div class="flex items-center gap-4 bg-surface rounded-lg border border-outline-variant p-1">
<button aria-label="Decrease quantity" class="w-8 h-8 rounded-md bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high">

</button>
<span class="font-body-lg text-body-lg font-medium w-6 text-center text-on-surface">1</span>

<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</div>
